services:
  - type: web
    name: bloodconnect-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User will need to provide this (e.g., MongoDB Atlas URI)
      - key: JWT_SECRET
        sync: false # User will need to provide a secure random string
      - key: EMAIL_USER
        sync: false # Optional: SMTP Email username (for fallback alerts)
      - key: EMAIL_PASS
        sync: false # Optional: SMTP Email password/app password
